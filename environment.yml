name: nyc_travel
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core
  - pandas>=2.0.0
  - numpy<2.0.0
  - scikit-learn>=1.3.0
  - scipy>=1.11.0

  # ML Models
  - xgboost>=2.0.0
  - lightgbm>=4.0.0
  - joblib>=1.3.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.17.0

  # Geospatial
  - geopandas>=0.14.0
  - shapely>=2.0.0
  - fiona>=1.9.0

  # Data formats
  - pyarrow>=13.0.0

  # Utilities
  - requests>=2.31.0
  - tqdm>=4.66.0
  - pyyaml>=6.0

  # Jupyter
  - jupyterlab>=4.0.0
  - ipykernel>=6.25.0

  - pip:
    - optuna>=3.3.0
    - shap>=0.43.0
    - streamlit>=1.28.0
    - gradio>=4.0.0
    - pytrends>=4.9.0
    - torch>=2.0.0
    - torch-geometric>=2.4.0
    - pyngrok>=8.0.0
