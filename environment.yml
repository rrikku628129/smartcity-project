name: nyc_travel_advisor
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.10

  # ── Core Data ──────────────────────────────────────────────────
  - pandas>=2.0.0
  - numpy<2                    # pin to <2 for Windows compatibility
  - pyarrow>=14.0.0            # parquet file support

  # ── Geospatial ─────────────────────────────────────────────────
  - geopandas>=0.14.0
  - shapely>=2.0.0

  # ── Visualization ──────────────────────────────────────────────
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # ── Machine Learning ───────────────────────────────────────────
  - scikit-learn>=1.3.0
  - xgboost>=2.0.0
  - lightgbm>=4.0.0

  # ── NLP / Sentiment ────────────────────────────────────────────
  - nltk>=3.8.0

  # ── Time Series ────────────────────────────────────────────────
  - statsmodels>=0.14.0

  # ── Utilities ──────────────────────────────────────────────────
  - requests>=2.31.0           # weather API (Open-Meteo)
  - joblib>=1.3.0              # model serialization
  - python-dotenv>=1.0.0

  # ── Notebook ───────────────────────────────────────────────────
  - jupyterlab>=4.0.0
  - ipykernel>=6.0.0

  # ── pip-only packages ──────────────────────────────────────────
  - pip
  - pip:
    - transformers>=4.35.0     # RoBERTa sentiment model
    - torch>=2.0.0             # PyTorch backend
    - gradio>=4.0.0            # web interface
    - optuna>=3.4.0            # hyperparameter tuning
    - shap>=0.44.0             # model interpretability
